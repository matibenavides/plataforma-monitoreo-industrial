<!doctype html>
<html lang="es" data-bs-theme="auto">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Plataforma de Monitoreo Industrial - Demo">
  <title>Plataforma Monitoreo Industrial · Demo</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap");

    * {
      box-sizing: border-box;
    }

    :root {
      --primary: #6c47d4;
      --primary-light: #ede8fb;
      --bg: #F7F2FF;
      --text: #0E0123;
    }

    body {
      font-family: "Rubik", sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem 2rem;
      box-shadow: 0 8px 40px rgba(108, 71, 212, 0.13);
      width: 100%;
      max-width: 440px;
    }

    .login-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #6c47d4 60%, #b39ddb 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.2rem;
      box-shadow: 0 4px 16px rgba(108, 71, 212, 0.25);
    }

    .login-logo i {
      font-size: 2rem;
      color: #fff;
    }

    h1.login-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      margin-bottom: 0.2rem;
    }

    .login-subtitle {
      color: #8071a0;
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .form-floating label {
      color: #8071a0;
      font-size: 0.9rem;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 0.18rem rgba(108, 71, 212, 0.18);
    }

    .btn-primary-custom {
      background: linear-gradient(90deg, #6c47d4 0%, #9b7fe8 100%);
      border: none;
      border-radius: 10px;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 0.65rem;
      font-size: 1rem;
      transition: opacity 0.2s;
    }

    .btn-primary-custom:hover {
      opacity: 0.92;
    }

    .demo-note {
      background: var(--primary-light);
      border-radius: 10px;
      padding: 0.6rem 1rem;
      font-size: 0.82rem;
      color: #5b3faa;
      margin-bottom: 1.4rem;
      text-align: center;
    }

    .footer-copy {
      color: #b0a0c8;
      font-size: 0.78rem;
      text-align: center;
      margin-top: 1.4rem;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="login-logo">
      <i class="bi bi-graph-up-arrow"></i>
    </div>
    <h1 class="login-title">Plataforma Monitoreo</h1>
    <p class="login-subtitle">Sistema Industrial de Control de Datos</p>

    <div class="demo-note">
      <i class="bi bi-info-circle me-1"></i>
      Demo estático — usa cualquier credencial
    </div>

    <form action="dashboard.html" method="get" autocomplete="off">
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="floatingInput" placeholder="Usuario" name="usuario">
        <label for="floatingInput"><i class="bi bi-person me-1"></i>Nombre</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="floatingPassword" placeholder="Contraseña" name="contraseña">
        <label for="floatingPassword"><i class="bi bi-lock me-1"></i>Contraseña</label>
      </div>
      <div class="form-check text-start my-3">
        <input class="form-check-input" type="checkbox" id="flexCheckDefault">
        <label class="form-check-label text-muted small" for="flexCheckDefault">Recuérdame</label>
      </div>
      <button class="btn btn-primary-custom w-100 py-2 text-white" type="submit" id="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
      </button>
    </form>

    <p class="footer-copy">&copy; 2025 Matias Benavides · DDC</p>

    
    <div style="border-top:1px solid #ede8fb; margin-top:1rem; padding-top:1rem;">
      <p
        style="text-align:center; font-size:0.75rem; color:#8071a0; font-weight:600; margin-bottom:0.6rem; letter-spacing:0.04em; text-transform:uppercase;">
        Acceso rápido al demo</p>
      <div style="display:flex; flex-wrap:wrap; gap:6px; justify-content:center;">
        <a href="dashboard.html" class="btn btn-sm btn-outline-primary"
          style="border-radius:20px; font-size:0.72rem;"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
        <a href="cloracion.html" class="btn btn-sm btn-outline-secondary"
          style="border-radius:20px; font-size:0.72rem;"><i class="bi bi-droplet me-1"></i>Cloraciones</a>
        <a href="fungicida.html" class="btn btn-sm btn-outline-secondary"
          style="border-radius:20px; font-size:0.72rem;"><i class="bi bi-virus me-1"></i>Fungicidas</a>
        <a href="ppm.html" class="btn btn-sm btn-outline-secondary" style="border-radius:20px; font-size:0.72rem;"><i
            class="bi bi-activity me-1"></i>PPM</a>
        <a href="temperatura.html" class="btn btn-sm btn-outline-secondary"
          style="border-radius:20px; font-size:0.72rem;"><i class="bi bi-thermometer-half me-1"></i>Temperaturas</a>
        <a href="producto.html" class="btn btn-sm btn-outline-secondary"
          style="border-radius:20px; font-size:0.72rem;"><i class="bi bi-box-seam me-1"></i>Productos</a>
        <a href="control-cloracion.html" class="btn btn-sm btn-outline-secondary"
          style="border-radius:20px; font-size:0.72rem;"><i class="bi bi-pencil-square me-1"></i>Reportes</a>
      </div>
    </div>
  </div>
</body>

</html>
