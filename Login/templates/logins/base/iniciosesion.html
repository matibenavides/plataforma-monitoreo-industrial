{% load static %}
<!doctype html>
<html lang="es" data-bs-theme="auto">

<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="">
  <title>Plataforma Monitoreo Industrial</title>
  <link rel="stylesheet" href="{% static 'logins/css/sign-in.css' %}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">


</head>

<body>

  {% if messages %}
  {% for message in messages %}
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <img src="{% static 'logins/img/logosolo.png' %}" class="rounded me-2" alt="..." style="width: 20px;">
        <strong class="me-auto">DDC</strong>
        <small>Justo ahora</small>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body">
        {{ message }}
      </div>
    </div>
  </div>
  {% endfor %}
  {% endif %}


  <div class="login-card">
    <div class="login-logo">
      <i class="bi bi-graph-up-arrow"></i>
    </div>
    <h1 class="login-title">Plataforma Monitoreo</h1>
    <p class="login-subtitle">Sistema Industrial de Control de Datos</p>

    <br>

    <form action="{% url 'inicio' %}" method="post" autocomplete="off">
      {% csrf_token %}
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="floatingInput" placeholder="Usuario" name="usuario">
        <label for="floatingInput"><i class="bi bi-person me-1"></i>Nombre</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="floatingPassword" placeholder="Contraseña" name="contraseña">
        <label for="floatingPassword"><i class="bi bi-lock me-1"></i>Contraseña</label>
      </div>
      <div class="form-check text-start my-3">
        <input class="form-check-input" type="checkbox" id="flexCheckDefault">
        <label class="form-check-label text-muted small" for="flexCheckDefault">Recuérdame</label>
      </div>
      <button class="btn btn-primary-custom w-100 py-2 text-white" type="submit" id="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
      </button>
    </form>

    <p class="footer-copy">&copy; 2025 Matias Benavides · DDC</p>
    <br>
    <!-- Demo quick access -->
    <div style="border-top:1px solid #ede8fb; margin-top:1rem; padding-top:1rem;">
      <p
        style="text-align:center; font-size:0.75rem; color:#8071a0; font-weight:600; margin-bottom:0.6rem; letter-spacing:0.04em; text-transform:uppercase;">
        Acceso rápido</p>
      <div style="display:flex; flex-wrap:wrap; gap:6px; justify-content:center;">
        <a href="{% url 'admin:index' %}" class="btn btn-sm btn-outline-primary"
          style="border-radius:20px; font-size:0.72rem;"><i class="bi bi-speedometer2 me-1"></i>Admin</a>
      </div>
    </div>
  </div>

  <script src="{% static 'cloraciones/js/toast.js' %}"></script>
</body>

</html>
